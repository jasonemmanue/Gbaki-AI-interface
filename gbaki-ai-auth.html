<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gbaki AI – Authentification</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2563eb;--primary-hover:#1d4ed8;
  --bg:#e8f0fb;--surface:#fff;--text:#1e293b;--text-muted:#64748b;
  --border:#e2e8f0;--input-bg:#f8fafc;--error:#ef4444;--success:#22c55e;
  --shadow:0 4px 24px rgba(37,99,235,.10);--radius:14px;--radius-sm:10px;
}
html,body{height:100%;font-family:'Plus Jakarta Sans','Segoe UI',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 16px;position:relative;overflow:hidden}
.blob1{position:fixed;top:-120px;left:-120px;width:400px;height:400px;background:radial-gradient(circle,rgba(37,99,235,.13) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.blob2{position:fixed;bottom:-100px;right:-100px;width:350px;height:350px;background:radial-gradient(circle,rgba(37,99,235,.10) 0%,transparent 70%);border-radius:50%;pointer-events:none}

.card{background:var(--surface);border-radius:24px;box-shadow:var(--shadow),0 1px 3px rgba(0,0,0,.06);width:100%;max-width:460px;padding:36px 36px 32px;position:relative;z-index:1;animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* Header */
.header{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;gap:6px}
.logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.logo-label{display:flex;flex-direction:column}
.logo-ensea{font-size:13px;font-weight:800;color:#1d4ed8;letter-spacing:.06em;line-height:1}
.logo-dsc{font-size:10px;font-weight:600;color:#64748b;letter-spacing:.03em;line-height:1.3}
.title{font-size:28px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1}
.subtitle{font-size:14px;color:var(--text-muted);font-weight:400;text-align:center;line-height:1.4}

/* Tabs */
.tabs{display:flex;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:24px;gap:2px}
.tab{flex:1;padding:10px 16px;border-radius:9px;border:none;background:transparent;font-size:14px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all .22s ease;font-family:inherit}
.tab:hover:not(.active){color:var(--text);background:rgba(255,255,255,.6)}
.tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.28)}

/* Form */
.form{display:flex;flex-direction:column;gap:18px;animation:fadeIn .3s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.field{display:flex;flex-direction:column;gap:6px}
label{font-size:13.5px;font-weight:600;color:var(--text);letter-spacing:.01em}

.input-wrap{display:flex;align-items:center;border:1.8px solid var(--border);border-radius:var(--radius-sm);background:var(--input-bg);transition:border-color .18s,box-shadow .18s;overflow:hidden}
.input-wrap:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12);background:#fff}
.input-wrap.err{border-color:var(--error)!important;box-shadow:0 0 0 3px rgba(239,68,68,.10)!important}

.icon{display:flex;align-items:center;justify-content:center;padding:0 12px;color:#94a3b8;flex-shrink:0}
input[type=email],input[type=text],input[type=password]{flex:1;border:none;background:transparent;padding:13px 12px 13px 0;font-size:14.5px;color:var(--text);outline:none;min-width:0;font-family:inherit}
input::placeholder{color:#b0bec5}
.eye-btn{display:flex;align-items:center;justify-content:center;background:none;border:none;padding:0 12px;color:#94a3b8;cursor:pointer;transition:color .15s}
.eye-btn:hover{color:var(--primary)}

.err-msg{font-size:12px;color:var(--error);font-weight:500}
.err-msg::before{content:'⚠ '}

/* Strength bar */
.strength-row{display:flex;align-items:center;gap:8px;margin-top:4px;height:16px}
.strength-bg{flex:1;height:4px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.strength-fill{height:100%;border-radius:4px;transition:width .3s ease,background .3s ease}
.strength-lbl{font-size:11.5px;font-weight:600;min-width:36px}

/* Button */
.btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .18s,transform .12s,box-shadow .18s;box-shadow:0 4px 14px rgba(37,99,235,.3);display:flex;align-items:center;justify-content:center;min-height:50px;font-family:inherit}
.btn:hover{background:var(--primary-hover);box-shadow:0 6px 20px rgba(37,99,235,.38);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}

/* Spinner */
.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* Forgot */
.forgot{text-align:center;margin-top:-4px}
.forgot a{font-size:13.5px;font-weight:500;color:var(--primary);text-decoration:none}
.forgot a:hover{text-decoration:underline}

/* Success */
.success-box{display:flex;flex-direction:column;align-items:center;gap:10px;padding:32px 16px;animation:fadeIn .35s ease both}
.success-icon{width:56px;height:56px;background:#dcfce7;color:#16a34a;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700}
.success-title{font-size:17px;font-weight:700}
.success-sub{font-size:14px;color:var(--text-muted);text-align:center}

/* Footer */
footer{margin-top:20px;font-size:12px;color:#94a3b8;text-align:center;position:relative;z-index:1;font-weight:500}

/* Responsive */
@media(max-width:480px){
  .page{padding:20px 12px 16px;justify-content:flex-start;padding-top:28px}
  .card{padding:24px 18px 22px;border-radius:20px}
  .title{font-size:24px}
  input{font-size:16px}
}
</style>
</head>
<body>
<div class="page">
  <div class="blob1"></div>
  <div class="blob2"></div>

  <div class="card">
    <!-- Header -->
    <div class="header">
      <div class="logo-wrap">
        <svg width="56" height="56" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="64" height="64" rx="14" fill="#fff"/>
          <rect x="1" y="1" width="62" height="62" rx="13" stroke="#e2e8f0" stroke-width="1.5" fill="none"/>
          <circle cx="32" cy="14" r="4" fill="#2563eb" opacity=".9"/>
          <circle cx="14" cy="38" r="4" fill="#2563eb" opacity=".7"/>
          <circle cx="50" cy="38" r="4" fill="#2563eb" opacity=".7"/>
          <circle cx="22" cy="52" r="3" fill="#2563eb" opacity=".5"/>
          <circle cx="42" cy="52" r="3" fill="#2563eb" opacity=".5"/>
          <circle cx="32" cy="32" r="5" fill="#1d4ed8"/>
          <line x1="32" y1="14" x2="32" y2="27" stroke="#2563eb" stroke-width="1.5" opacity=".5"/>
          <line x1="14" y1="38" x2="27" y2="32" stroke="#2563eb" stroke-width="1.5" opacity=".5"/>
          <line x1="50" y1="38" x2="37" y2="32" stroke="#2563eb" stroke-width="1.5" opacity=".5"/>
          <line x1="14" y1="38" x2="22" y2="52" stroke="#2563eb" stroke-width="1.5" opacity=".4"/>
          <line x1="50" y1="38" x2="42" y2="52" stroke="#2563eb" stroke-width="1.5" opacity=".4"/>
          <line x1="32" y1="14" x2="14" y2="38" stroke="#2563eb" stroke-width="1" opacity=".3"/>
          <line x1="32" y1="14" x2="50" y2="38" stroke="#2563eb" stroke-width="1" opacity=".3"/>
        </svg>
        <div class="logo-label">
          <span class="logo-ensea">ENSEA</span>
          <span class="logo-dsc">Data Science Club</span>
        </div>
      </div>
      <h1 class="title">Gbaki AI</h1>
      <p class="subtitle">Recherche intelligente dans vos documents académiques</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Connexion</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">Inscription</button>
    </div>

    <!-- Login Form -->
    <div id="form-login">
      <form class="form" onsubmit="handleLogin(event)" novalidate>
        <div class="field">
          <label for="l-email">Email institutionnel</label>
          <div class="input-wrap" id="l-email-wrap">
            <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
            <input type="email" id="l-email" placeholder="prenom.nom@universite.edu" />
          </div>
          <span class="err-msg" id="l-email-err" style="display:none"></span>
        </div>
        <div class="field">
          <label for="l-pass">Mot de passe</label>
          <div class="input-wrap" id="l-pass-wrap">
            <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" id="l-pass" placeholder="••••••••" />
            <button type="button" class="eye-btn" onclick="togglePwd('l-pass',this)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="err-msg" id="l-pass-err" style="display:none"></span>
        </div>
        <button type="submit" class="btn" id="login-btn">Se connecter</button>
        <div class="forgot"><a href="#">Mot de passe oublié ?</a></div>
      </form>
    </div>

    <!-- Register Form -->
    <div id="form-register" style="display:none">
      <form class="form" onsubmit="handleRegister(event)" novalidate>
        <div class="field">
          <label for="r-name">Nom complet</label>
          <div class="input-wrap" id="r-name-wrap">
            <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></span>
            <input type="text" id="r-name" placeholder="Prénom Nom" />
          </div>
          <span class="err-msg" id="r-name-err" style="display:none"></span>
        </div>
        <div class="field">
          <label for="r-email">Email institutionnel</label>
          <div class="input-wrap" id="r-email-wrap">
            <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span>
            <input type="email" id="r-email" placeholder="prenom.nom@universite.edu" />
          </div>
          <span class="err-msg" id="r-email-err" style="display:none"></span>
        </div>
        <div class="field">
          <label for="r-pass">Mot de passe</label>
          <div class="input-wrap" id="r-pass-wrap">
            <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" id="r-pass" placeholder="••••••••" oninput="updateStrength()" />
          </div>
          <div class="strength-row" id="strength-row" style="display:none">
            <div class="strength-bg"><div class="strength-fill" id="strength-fill"></div></div>
            <span class="strength-lbl" id="strength-lbl"></span>
          </div>
          <span class="err-msg" id="r-pass-err" style="display:none"></span>
        </div>
        <div class="field">
          <label for="r-confirm">Confirmer le mot de passe</label>
          <div class="input-wrap" id="r-confirm-wrap">
            <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" id="r-confirm" placeholder="••••••••" />
            <button type="button" class="eye-btn" onclick="togglePwd('r-confirm',this)">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="err-msg" id="r-confirm-err" style="display:none"></span>
        </div>
        <button type="submit" class="btn" id="register-btn">Créer un compte</button>
      </form>
    </div>
  </div>

  <footer>École Nationale Supérieur de Statistique et d'Économie Appliquée</footer>
</div>

<script>
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-register').classList.toggle('active', !isLogin);
  document.getElementById('form-login').style.display = isLogin ? 'block' : 'none';
  document.getElementById('form-register').style.display = isLogin ? 'none' : 'block';
}

function togglePwd(id, btn) {
  const input = document.getElementById(id);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.innerHTML = isText
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
}

function showErr(id, msg) {
  const el = document.getElementById(id+'-err');
  const wrap = document.getElementById(id+'-wrap');
  if (msg) { el.textContent = msg; el.style.display = 'block'; wrap && wrap.classList.add('err'); }
  else { el.style.display = 'none'; wrap && wrap.classList.remove('err'); }
}

function updateStrength() {
  const val = document.getElementById('r-pass').value;
  const row = document.getElementById('strength-row');
  const fill = document.getElementById('strength-fill');
  const lbl = document.getElementById('strength-lbl');
  if (!val) { row.style.display = 'none'; return; }
  row.style.display = 'flex';
  const lvl = val.length < 6 ? 1 : val.length < 10 ? 2 : 3;
  const colors = ['','#ef4444','#f59e0b','#22c55e'];
  const labels = ['','Faible','Moyen','Fort'];
  fill.style.width = (lvl/3*100)+'%';
  fill.style.background = colors[lvl];
  lbl.textContent = labels[lvl];
  lbl.style.color = colors[lvl];
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<span class="spinner"></span>'
    : btnId === 'login-btn' ? 'Se connecter' : 'Créer un compte';
}

function showSuccess(container, title, sub) {
  document.getElementById(container).innerHTML = `
    <div class="success-box">
      <div class="success-icon">✓</div>
      <p class="success-title">${title}</p>
      <p class="success-sub">${sub}</p>
    </div>`;
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  let ok = true;
  if (!email) { showErr('l-email','L\'email est requis.'); ok=false; }
  else if (!/\S+@\S+\.\S+/.test(email)) { showErr('l-email','Email invalide.'); ok=false; }
  else showErr('l-email','');
  if (!pass) { showErr('l-pass','Le mot de passe est requis.'); ok=false; }
  else showErr('l-pass','');
  if (!ok) return;
  setLoading('login-btn', true);
  await new Promise(r => setTimeout(r, 1200));
  showSuccess('form-login','Connexion réussie !','Bienvenue sur Gbaki AI.');
}

async function handleRegister(e) {
  e.preventDefault();
  const name = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const pass = document.getElementById('r-pass').value;
  const confirm = document.getElementById('r-confirm').value;
  let ok = true;
  if (!name) { showErr('r-name','Le nom complet est requis.'); ok=false; } else showErr('r-name','');
  if (!email) { showErr('r-email','L\'email est requis.'); ok=false; }
  else if (!/\S+@\S+\.\S+/.test(email)) { showErr('r-email','Email invalide.'); ok=false; }
  else showErr('r-email','');
  if (!pass) { showErr('r-pass','Le mot de passe est requis.'); ok=false; }
  else if (pass.length < 8) { showErr('r-pass','Au moins 8 caractères.'); ok=false; }
  else showErr('r-pass','');
  if (!confirm) { showErr('r-confirm','Veuillez confirmer le mot de passe.'); ok=false; }
  else if (confirm !== pass) { showErr('r-confirm','Les mots de passe ne correspondent pas.'); ok=false; }
  else showErr('r-confirm','');
  if (!ok) return;
  setLoading('register-btn', true);
  await new Promise(r => setTimeout(r, 1200));
  showSuccess('form-register','Compte créé avec succès !','Vérifiez votre email pour activer votre compte.');
}
</script>
</body>
</html>
